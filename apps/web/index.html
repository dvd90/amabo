<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1a1714" />

    <!-- Icons & PWA manifest -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <title>Amabo — the Amarium</title>
    <meta
      name="description"
      content="A small creature of unspent love lives on its own clock inside a sealed glass world. Care for it, and read what it did and felt while you were away."
    />

    <!-- Open Graph (Facebook, iMessage, Slack, Discord, LinkedIn) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Amabo" />
    <meta property="og:title" content="Amabo — the Amarium" />
    <meta
      property="og:description"
      content="A small creature of unspent love lives on its own clock inside a sealed glass world. Be its Light."
    />
    <meta property="og:image" content="/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:image:alt"
      content="A glowing amber creature in a dark glass world — Be its Light."
    />

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Amabo — the Amarium" />
    <meta
      name="twitter:description"
      content="A small creature of unspent love lives on its own clock inside a sealed glass world. Be its Light."
    />
    <meta name="twitter:image" content="/og.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
