name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref so a quick re-push doesn't queue up.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Each check is its own job so the PR shows independent green/red signals and
  # they run in parallel. The pnpm store cache keeps the repeated installs cheap.
  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: ESLint (incl. engine-purity guardrail)
        run: pnpm lint
      - name: Prettier
        run: pnpm format:check

  typecheck:
    name: Typecheck & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Typecheck (tsc project references)
        run: pnpm typecheck
      - name: Build (verify every package emits)
        run: pnpm build

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Vitest (all packages)
        run: pnpm test
      - name: Engine coverage gate (pure core ~100%)
        run: pnpm --filter @amabo/engine test:coverage
